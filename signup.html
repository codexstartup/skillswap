<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillSwap - Sign Up</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter,sans-serif;
}

body{
  min-height:100vh;
  background:#050505;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  overflow:hidden;
}

.glow{
  position:fixed;
  width:500px;
  height:500px;
  background:linear-gradient(45deg,#7c3aed,#2563eb);
  filter:blur(150px);
  opacity:.5;
  top:-200px;
  left:-150px;
  z-index:-1;
}

.card{
  width:100%;
  max-width:500px;
  background:#ffffff10;
  border:1px solid #ffffff20;
  backdrop-filter:blur(20px);
  border-radius:30px;
  padding:35px;
}

h1{
  text-align:center;
  margin-bottom:10px;
}

p{
  text-align:center;
  color:#aaa;
  margin-bottom:30px;
}

input{
  width:100%;
  padding:15px;
  margin-bottom:15px;
  border:none;
  border-radius:15px;
  background:#ffffff10;
  color:white;
  outline:none;
}

input::placeholder{
  color:#bbb;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:15px;
  background:linear-gradient(90deg,#7c3aed,#2563eb);
  color:white;
  font-size:16px;
  cursor:pointer;
}

.login-link{
  text-align:center;
  margin-top:20px;
  color:#aaa;
}

.login-link a{
  color:#8b5cf6;
  text-decoration:none;
}

</style>
</head>

<body>

<div class="glow"></div>

<div class="card">

  <h1>Create Account 🚀</h1>
  <p>Join SkillSwap and start exchanging skills.</p>

  <input id="name" type="text" placeholder="Full Name">
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <input id="teachSkills" type="text" placeholder="Skills you can teach">
  <input id="learnSkills" type="text" placeholder="Skills you want to learn">

  <button id="signupBtn">Create Account</button>

  <div class="login-link">
    Already have an account?
    <a href="login.html">Login</a>
  </div>

</div>

</body>
</html>
