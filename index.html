<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSwap - Login</title>
    
    <style>
        /* 1. Global Reset & Cool Gradient Background */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cabinet Grotesk', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 0% 0%, #4f46e5 0%, transparent 35%),
                        radial-gradient(circle at 100% 100%, #06b6d4 0%, transparent 40%),
                        #0f172a; /* Sleek dark blue/slate base */
            overflow: hidden;
            perspective: 1000px; /* Essential for 3D tilt effects */
        }

        /* 2. Glassmorphism Card Container */
        .glass-container {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: transform 0.2s ease, box-shadow 0.3s ease;
            transform-style: preserve-3d;
        }

        /* Subtle glowing orbit behind the card for extra depth */
        .glass-container::before {
            content: '';
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: linear-gradient(45deg, #4f46e5, #06b6d4);
            z-index: -1;
            border-radius: 30px;
            opacity: 0.15;
            filter: blur(40px);
            pointer-events: none;
        }

        /* 3. Typography & Branding */
        h2 {
            color: #ffffff;
            font-size: 2rem;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            transform: translateZ(30px); /* Pushes text out in 3D space */
        }

        p {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 32px;
            transform: translateZ(20px);
        }

        /* 4. Inputs with modern glass styling */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
            transform: translateZ(25px);
        }

        .input-group label {
            display: block;
            color: #cbd5e1;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #06b6d4;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
        }

        .input-group input::placeholder {
            color: #64748b;
        }

        /* 5. OG Animated Button */
        .btn {
            position: relative;
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 10px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
            transform: translateZ(35px);
        }

        .btn:hover {
            transform: translateZ(40px) scale(1.02);
            box-shadow: 0 8px 25px rgba(79, 70, 229, 0.5);
        }

        /* Active click effect */
        .btn:active {
            transform: translateZ(30px) scale(0.98);
        }

        /* Shiny reflection overlay on hover */
        .btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: all 0.5s ease;
        }

        .btn:hover::after {
            left: 100%;
        }

        /* 6. Footer Links */
        .switch-page {
            margin-top: 24px;
            font-size: 0.9rem;
            color: #94a3b8;
            transform: translateZ(20px);
        }

        .switch-page a {
            color: #06b6d4;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .switch-page a:hover {
            color: #22d3ee;
            text-shadow: 0 0 8px rgba(34, 211, 238, 0.4);
        }
    </style>
</head>
<body>

    <!-- 3D Glass Card Container -->
    <div class="glass-container" id="tiltCard">
        <h2>SkillSwap</h2>
        <p>Learn together. Teach together.</p>
        
        <form id="loginForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" placeholder="you@example.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Log In</button>
        </form>

        <div class="switch-page">
            Don't have an account? <a href="signup.html">Sign Up</a>
        </div>
    </div>

    <!-- JAVASCRIPT: 3D MOUSE HOVER ANIMATION + FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // 1. Paste your Firebase Config keys right here:
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 2. 3D Tilt Hover Animation Logic
        const card = document.getElementById('tiltCard');
        
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25; // Rotate angle sensitivity
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Reset positions smoothly when mouse leaves screen center area
        document.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
            card.style.transition = "transform 0.5s ease";
        });

        card.addEventListener('mouseenter', () => {
            card.style.transition = "none"; // Disables delay while hovering for instant tracking
        });

        // 3. Handle Firebase Login Form Submission
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    alert("Logged in successfully!");
                    window.location.href = "dashboard.html";
                })
                .catch((error) => {
                    alert("Error: " + error.message);
                });
        });
    </script>
</body>
</html>
